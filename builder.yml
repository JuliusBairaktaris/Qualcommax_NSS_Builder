# Qualcommax Builder — fork configuration.
#
# This is the single file you edit when forking. The workflow and scripts read
# everything from here. It defines one or more build *variants*; each variant is a
# self-contained recipe: its own upstream tree, feeds, device config fragment, and
# release prefix.
#
#   - Every variant builds on the cron schedule and on push to main, and is skipped
#     automatically if its upstream hasn't changed since the last release. Set
#     `scheduled: false` on a variant to make it manual-only instead.
#   - You can also force a build from Actions -> Build -> "Run workflow" and picking
#     `variant:` (an individual id, or `all`).
#
# After editing, push to your fork. GitHub Actions picks up the change on the next
# run (or trigger one manually).

# Release publishing settings, shared by every variant.
release:
  keep: 2                       # newest releases to retain *per variant prefix*
  artifact_retention_days: 7    # GitHub Actions artifact retention (separate from the release)

# Build variants. Add, remove, or retarget freely — the pipeline is a matrix over this list.
variants:
  # --------------------------------------------------------------------------------
  # NSS-accelerated build: qosmio openwrt-ipq fork + NSS packages.
  # Hardware packet offload via the IPQ807x Network Subsystem cores (2+ Gbps NAT).
  # --------------------------------------------------------------------------------
  - id: nss
    upstream:
      repo: qosmio/openwrt-ipq
      ref: main-nss
    nss_packages:                         # NSS packages tree (tracked so package-only updates trigger a build)
      repo: AgustinLorenzo/nss-packages
      ref: NSS-12.5-K6.x
    target: qualcommax/ipq807x            # bin/targets/<target>/ — also parameterizes the artifact path
    device: xiaomi_ax3600                 # selects devices/<id>/ (config + config.nss + files*/)
    feeds:                                # appended to feeds.conf as `src-git <name> <url>`
      - name: qosmio
        url: https://github.com/qosmio/packages-extra
      - name: sqm_nss
        url: https://github.com/JuliusBairaktaris/sqm-scripts-nss
    release:
      prefix: main-nss                    # tag = <prefix>-<UTC timestamp>-<run id>

  # --------------------------------------------------------------------------------
  # EDMA-rework build: the qca-edma PR #22381 branch, built directly. NO NSS.
  # CPU-bound ethernet via the upstreamable qca-edma driver.
  #
  # We build the PR author's branch as-is rather than merging the PR onto latest main:
  # his qca-ppe/qca-uniphy pins and the phylink PCS patches are coherent on the branch,
  # so it compiles. (Merging the old PR onto a newer main breaks when main's phylink
  # moves ahead of the PR's driver pins.) Tracks the branch tip and, like nss, rebuilds
  # automatically whenever the author pushes (skipped while unchanged).
  # Once PR #22381 is merged upstream, point repo/ref at openwrt/openwrt + main.
  # --------------------------------------------------------------------------------
  - id: edma
    upstream:
      repo: Ansuel/openwrt                # PR #22381 author's fork
      ref: qca-edma-rework                # the PR branch, built directly (branch tip each run)
    target: qualcommax/ipq807x
    device: xiaomi_ax3600                 # uses config + config.edma + files.edma/
    feeds: []                             # stock OpenWrt feeds only
    packages:                             # extra package repos cloned into package/<name>/
      # QoSmate (advanced HFSC/CAKE QoS). EDMA-only: it shapes on the Linux/tc data path,
      # which NSS bypasses via hardware offload. Each ships a top-level Makefile, so they
      # are cloned into package/ rather than added as feeds. Enabled in config.edma.
      - name: qosmate
        url: https://github.com/hudra0/qosmate.git
      - name: luci-app-qosmate
        url: https://github.com/hudra0/luci-app-qosmate.git
    release:
      prefix: edma
