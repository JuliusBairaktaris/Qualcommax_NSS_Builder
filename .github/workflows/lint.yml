name: Lint

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/**'
      - 'scripts/**'
  pull_request:
    paths:
      - '.github/workflows/**'
      - 'scripts/**'

permissions:
  contents: read

jobs:
  actionlint:
    name: actionlint
    runs-on: ubuntu-26.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Run actionlint
        run: |
          set -euo pipefail
          curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash \
            | bash -s -- 1.7.7
          ./actionlint -color

  shellcheck:
    name: shellcheck
    runs-on: ubuntu-26.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Run shellcheck
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck
          shellcheck -x scripts/*.sh scripts/lib/*.sh scripts/tests/*.sh

  yamllint:
    name: yamllint
    runs-on: ubuntu-26.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Run yamllint
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends yamllint
          yamllint -d "{extends: default, rules: {line-length: disable, document-start: disable, truthy: {check-keys: false}}}" \
            .github/workflows/

  prune-tests:
    name: prune-releases tests
    runs-on: ubuntu-26.04
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y --no-install-recommends jq
      - name: Run tests
        run: bash scripts/tests/prune-releases.test.sh
